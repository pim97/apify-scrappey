<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Dark surface background, subtle vertical depth -->
    <linearGradient id="bg" x1="256" y1="0" x2="256" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#161b22"/>
      <stop offset="1" stop-color="#0d1117"/>
    </linearGradient>
    <!-- Brand green ramp for the bolt -->
    <linearGradient id="bolt" x1="180" y1="80" x2="320" y2="432" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4ade80"/>
      <stop offset="0.55" stop-color="#22c55e"/>
      <stop offset="1" stop-color="#16a34a"/>
    </linearGradient>
    <!-- Soft green glow behind the bolt -->
    <radialGradient id="glow" cx="256" cy="248" r="200" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22c55e" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#22c55e" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Rounded-square app tile -->
  <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect x="3" y="3" width="506" height="506" rx="109" fill="none" stroke="#2d343e" stroke-width="6"/>

  <!-- Glow -->
  <circle cx="256" cy="248" r="200" fill="url(#glow)"/>

  <!-- Lightning bolt -->
  <path d="M291 78 L150 286 L242 286 L214 434 L372 214 L276 214 Z"
        fill="url(#bolt)" stroke="#86efac" stroke-width="6"
        stroke-linejoin="round"/>

  <!-- Cursor / send accent (echoes the original mark) -->
  <path d="M360 150 L416 132 L392 188 L378 168 Z"
        fill="#4ade80"/>
</svg>
